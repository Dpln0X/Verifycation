<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Portaal - Inloggen</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #ffffff; width: 100%; max-width: 380px; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; }
        .wifi-icon { background: #007bff; color: white; width: 60px; height: 60px; line-height: 60px; border-radius: 50%; font-size: 30px; margin: 0 auto 20px; }
        h2 { margin: 0 0 10px; color: #1c1e21; font-size: 22px; }
        p { color: #606770; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #4b4f56; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #dddfe2; border-radius: 6px; font-size: 16px; background: #f5f6f7; transition: border 0.2s; }
        input:focus { border-color: #007bff; background: #fff; outline: none; }
        .btn-connect { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-connect:hover { background-color: #0069d9; }
        .terms { font-size: 11px; color: #90949c; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="wifi-icon">📶</div>
        <h2>Gratis WiFi Netwerk</h2>
        <p>Log in met je accountgegevens om volledige toegang te krijgen tot het internet.</p>
        
        <form action="/login" method="POST">
            <div class="input-group">
                <label>E-mailadres</label>
                <input type="email" name="email" placeholder="voorbeeld@mail.com" required>
            </div>
            
            <div class="input-group">
                <label>Wachtwoord</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-connect">Verbinden met Internet</button>
        </form>
        
        <div class="terms">
            Door te verbinden gaat u akkoord met de <br>algemene voorwaarden en het privacybeleid.
        </div>
    </div>
</body>
</html>
